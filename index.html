<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerbird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e17;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      margin: auto;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    // --- Canvas setup ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // Logical game resolution (coordinates stay 400×600)
    const LOGICAL_WIDTH = 400;
    const LOGICAL_HEIGHT = 600;

    canvas.width = LOGICAL_WIDTH;
    canvas.height = LOGICAL_HEIGHT;

    // Auto-resize: fill viewport height, maintain 2:3, DPR-aware
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      // Calculate display size — full viewport height, 2:3 width
      let displayHeight = window.innerHeight;
      let displayWidth = Math.round(displayHeight * 2 / 3);

      // Clamp width to viewport (portrait / ultrawide safety)
      if (displayWidth > window.innerWidth) {
        displayWidth = window.innerWidth;
        displayHeight = Math.round(displayWidth * 3 / 2);
      }

      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayHeight + 'px';

      // Scale pixel buffer for Retina sharpness
      canvas.width = Math.round(LOGICAL_WIDTH * dpr);
      canvas.height = Math.round(LOGICAL_HEIGHT * dpr);

      // Scale context so all game code still works in 400×600 coords
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // Resize on load and on window change
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- Sound Effects (Web Audio API chiptune) ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      // Resume if suspended (browsers require user gesture)
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // Helper: play a single oscillator tone
    function playTone(freq, type, duration, slide, vol) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + duration);
      gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    // Helper: white noise burst
    function playNoise(duration, vol) {
      if (!audioCtx) return;
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start();
    }

    // --- Sound FX (A2 — Pepe Meme-Aware Chiptune) ---

    // 🐸 D1 — Boing: descending spring then bounce-back
    function sfxRibbit() {
      initAudio();
      // Descending 600→100Hz (spring stretch)
      playTone(600, 'sine', 0.06, 100, 0.06);
      // Bounce back 100→400Hz (spring recoil)
      setTimeout(() => playTone(100, 'sine', 0.06, 400, 0.04), 55);
    }

    // 📈 G2 — Triple Blip: three rising square beeps
    function sfxDing() {
      initAudio();
      playTone(400, 'square', 0.05, null, 0.12);
      setTimeout(() => playTone(600, 'square', 0.05, null, 0.12), 50);
      setTimeout(() => playTone(800, 'square', 0.06, null, 0.14), 100);
    }

    // 💥 Sad trombone death: descending sawtooth
    function sfxDeath() {
      initAudio();
      // Descending from 600Hz → 100Hz over 500ms
      playTone(600, 'sawtooth', 0.5, 100, 0.12);
      // Low rumble on top
      setTimeout(() => playTone(80, 'square', 0.3, 40, 0.06), 50);
    }

    // 🎮 Start arpeggio: C-E-G chiptune style
    function sfxStart() {
      initAudio();
      playTone(523, 'square', 0.1, null, 0.10);  // C5
      setTimeout(() => playTone(659, 'square', 0.1, null, 0.10), 80);  // E5
      setTimeout(() => playTone(784, 'square', 0.15, null, 0.10), 160); // G5
    }

    // --- Constants ---
    const GRAVITY = 0.5;
    const JUMP_VELOCITY = -8;
    const SPEED = 3;
    const GAP_SIZE = 270;  // Vertical gap between top/bottom bars (270px — easier gameplay)
    const SPAWN_INTERVAL_MIN = 90;
    const SPAWN_INTERVAL_MAX = 120;
    const PLAYER_X = 80;
    const PLAYER_WIDTH = 100;
    const PLAYER_HEIGHT = 100;

    // --- Game state ---
    const State = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };

    const game = {
      state: State.MENU,
      score: 0,
      obstacles: [],
      spawnTimer: 0,
      spawnInterval: SPAWN_INTERVAL_MIN,
      lastTime: 0,
      deathTimer: 0,
      scorePopTimer: 0,
      rainbowHue: 0,
      ripples: [],
      bgOffset: 0,
      particles: [],
    };

    // --- Player ---
    const player = {
      x: PLAYER_X,
      y: 0,
      width: PLAYER_WIDTH,
      height: PLAYER_HEIGHT,
      velocityY: 0,
      tiltAngle: 0,
    };

    function resetGame() {
      player.y = LOGICAL_HEIGHT / 2;
      player.velocityY = 0;
      game.score = 0;
      game.obstacles = [];
      game.spawnTimer = 0;
      game.spawnInterval = SPAWN_INTERVAL_MIN;
      game.deathTimer = 0;
      game.bgOffset = 0;
      game.particles = [];
      game.scorePopTimer = 0;
      game.rainbowHue = 0;
      game.ripples = [];
      game.streaks = [];
      player.tiltAngle = 0;
    }
    resetGame();

    // --- Obstacle asset placeholder ---
    // TODO: assign image URLs and wire into drawGame() to replace shape rendering
    const OBSTACLE_IMAGE_SRC = null;
    // --- Player asset ---
    // Image is loaded below and wired into drawGame()
    const PLAYER_IMAGE_SRC = 'assets/player.png';
    const playerImage = new Image();
    let playerImageLoaded = false;
    playerImage.onload = () => { playerImageLoaded = true; };
    playerImage.src = PLAYER_IMAGE_SRC;
    // --- Background asset ---
    const BACKGROUND_IMAGE_SRC = 'assets/background.jpg';
    const bgImage = new Image();
    let bgImageLoaded = false;
    let bgNaturalW = 1200;
    let bgNaturalH = 600;
    bgImage.onload = () => {
      bgImageLoaded = true;
      bgNaturalW = bgImage.naturalWidth;
      bgNaturalH = bgImage.naturalHeight;
    };
    bgImage.src = BACKGROUND_IMAGE_SRC;

    // --- Input ---
    function handleJump() {
      if (game.state === State.MENU) {
        sfxStart();
        game.state = State.PLAYING;
        resetGame();
        player.velocityY = JUMP_VELOCITY;
      } else if (game.state === State.PLAYING) {
        sfxRibbit();
        player.velocityY = JUMP_VELOCITY;
      } else if (game.state === State.GAME_OVER) {
        game.state = State.MENU;
        game.deathTimer = 0;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        handleJump();
      }
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleJump();
    });

    canvas.addEventListener('click', (e) => {
      e.preventDefault();
      handleJump();
    });

    function checkCollision(a, b) {
      const padding = 8; // fairness padding — makes game easier
      return a.x < b.x + b.width - padding &&
             a.x + a.width > b.x + padding &&
             a.y < b.y + b.height - padding &&
             a.y + a.height > b.y + padding;
    }

    function spawnObstacle() {
      const MIN_BAR_HEIGHT = Math.round(LOGICAL_HEIGHT * 0.13); // 80px min — keeps HUD area clear
      const minGapY = MIN_BAR_HEIGHT + GAP_SIZE / 2;
      const maxGapY = LOGICAL_HEIGHT - MIN_BAR_HEIGHT - GAP_SIZE / 2;
      const gapY = minGapY + Math.random() * (maxGapY - minGapY);
      game.obstacles.push({
        x: LOGICAL_WIDTH,
        gapY: gapY,
        gapSize: GAP_SIZE,
        width: 60,
        scored: false,
      });
    }

    // --- Update ---
    function update(dt) {
      if (game.state === State.PLAYING) {
        // Player physics
        player.velocityY += GRAVITY * dt;
        player.y += player.velocityY * dt;

        // Ceiling clamp
        if (player.y < 0) player.y = 0;

        // Ground check — clamp y before game-over to prevent clipping
        if (player.y + player.height > LOGICAL_HEIGHT) {
          player.y = LOGICAL_HEIGHT - player.height;
          sfxDeath();
          game.state = State.GAME_OVER;
        }

        // Parallax background scroll (30% of obstacle speed)
        game.bgOffset += SPEED * 0.3 * dt;

        // Spawn obstacles (dt-accumulated timer)
        game.spawnTimer += dt;
        if (game.spawnTimer >= game.spawnInterval) {
          spawnObstacle();
          const delay = SPAWN_INTERVAL_MIN + Math.floor(Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN));
          game.spawnInterval = delay;
          game.spawnTimer = 0;
        }

        // Move obstacles
        for (let i = game.obstacles.length - 1; i >= 0; i--) {
          const obs = game.obstacles[i];
          obs.x -= SPEED * dt;

          // Scoring
          if (!obs.scored && obs.x + obs.width < player.x) {
            obs.scored = true;
            game.score++;
            game.scorePopTimer = 500;
            game.rainbowHue = Math.random() * 360;
            sfxDing();
          }

          // Collision detection
          const topBar = { x: obs.x, y: 0, width: obs.width, height: obs.gapY - obs.gapSize / 2 };
          const bottomBar = { x: obs.x, y: obs.gapY + obs.gapSize / 2, width: obs.width, height: LOGICAL_HEIGHT - (obs.gapY + obs.gapSize / 2) };

          if (checkCollision(player, topBar) || checkCollision(player, bottomBar)) {
            sfxDeath();
            game.state = State.GAME_OVER;
          }

          // Remove off-screen
          if (obs.x + obs.width < 0) {
            game.obstacles.splice(i, 1);
          }
        }

        // --- Exhaust smoke particles ---
        // Spawn 2 particles per frame behind the rocket nozzle
        for (let i = 0; i < 2; i++) {
          game.particles.push({
            x: player.x - 1 + Math.random() * 8,
            y: player.y + 71 + Math.random() * 10,
            life: 1.0,
            size: 5 + Math.random() * 3,
            vx: -(1.5 + Math.random() * 1.5),
            vy: -(0.5 + Math.random() * 0.5) + Math.random() * 1.0,
          });
        }
        // Cap at 200 particles
        if (game.particles.length > 200) {
          game.particles.splice(0, game.particles.length - 200);
        }
        // Update existing particles
        for (let i = game.particles.length - 1; i >= 0; i--) {
          const p = game.particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          // Turbulence jitter
          p.vx += (Math.random() - 0.5) * 0.2;
          p.vy += (Math.random() - 0.5) * 0.2;
          p.life -= 0.02 * dt;
          // Size expands as smoke ages and spreads
          if (p.life < 0.75) p.size += 0.03 * dt;
          if (p.life < 0.5)  p.size += 0.04 * dt;
          if (p.life < 0.2)  p.size += 0.05 * dt;
          if (p.size > 16)   p.size = 16;
          if (p.life <= 0) {
            game.particles.splice(i, 1);
          }
        }

        // Smooth tilt: lerp toward velocity-based target
        const targetTilt = player.velocityY * 0.025;
        player.tiltAngle += (targetTilt - player.tiltAngle) * 0.15;
      }

      // Track death timer for shake/flash effect
      if (game.state === State.GAME_OVER) {
        game.deathTimer += dt * 16.667;
      }

      // Decrement score pop timer
      if (game.scorePopTimer > 0) {
        game.scorePopTimer -= dt * 16.667;
        if (game.scorePopTimer < 0) game.scorePopTimer = 0;
      }
    }

    // --- Draw ---
    function draw() {
      // Shake effect on death (±1.5px for 200ms — gentle arcade feedback)
      const shaking = game.deathTimer > 0 && game.deathTimer < 200;
      if (shaking) {
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3);
      }

      // Background fill (fallback if bg image hasn't loaded)
      ctx.fillStyle = '#0a0e17';
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Parallax background image (scrolls at 30% of obstacle speed)
      if (bgImageLoaded) {
        const bgW = bgNaturalW * (LOGICAL_HEIGHT / bgNaturalH);
        const bgH = LOGICAL_HEIGHT;
        const bgX = -(game.bgOffset % bgW);
        ctx.drawImage(bgImage, 0, 0, bgNaturalW, bgNaturalH, Math.round(bgX), 0, Math.round(bgW), bgH);
        ctx.drawImage(bgImage, 0, 0, bgNaturalW, bgNaturalH, Math.round(bgX + bgW) - 1, 0, Math.round(bgW) + 2, bgH);
      }

      if (game.state === State.MENU) {
        drawMenu();
      } else if (game.state === State.PLAYING || game.state === State.GAME_OVER) {
        drawGame();
      }

      if (game.state === State.GAME_OVER) {
        drawGameOver();
      }

      // End shake transform
      if (shaking) {
        ctx.restore();
      }

      // CRT scanline overlay (always on top, unaffected by shake)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      for (let y = 0; y < LOGICAL_HEIGHT; y += 4) {
        ctx.fillRect(0, y, LOGICAL_WIDTH, 2);
      }
    }

    let bestScore = 0;

    function drawMenu() {
      if (game.score > bestScore) bestScore = game.score;
      ctx.textAlign = 'center';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000000';

      if (bestScore > 0) {
        ctx.font = 'bold 18px Courier New, monospace';
        ctx.strokeText('ATH: 1 NMR ≈ $' + bestScore, LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 80);
        ctx.fillStyle = '#00d4aa';
        ctx.fillText('ATH: 1 NMR ≈ $' + bestScore, LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 80);
      }
      ctx.font = 'bold 48px Courier New, monospace';
      ctx.strokeText('NUMERBIRD', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 30);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('NUMERBIRD', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 30);
      ctx.font = '18px Courier New, monospace';
      ctx.strokeText('Press SPACE or Tap to Start', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 30);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Press SPACE or Tap to Start', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 30);
    }

    function drawGame() {
      // --- Obstacles (candlestick-chart style) ---
      for (const obs of game.obstacles) {
        const topHeight = obs.gapY - obs.gapSize / 2;
        const bottomY = obs.gapY + obs.gapSize / 2;
        const bottomHeight = LOGICAL_HEIGHT - bottomY;

        const wickColour = '#000000';
        const wickLen = 10;
        const borderW = 2;

        // --- Top bar ---
        const topBodyH = topHeight - wickLen;
        // Vertical gradient: dark green top → light green bottom (lit toward gap)
        const topGrad = ctx.createLinearGradient(0, 0, 0, topBodyH);
        topGrad.addColorStop(0, '#009624');
        topGrad.addColorStop(1, '#00e676');
        // Body fill + black border
        ctx.fillStyle = topGrad;
        ctx.strokeStyle = wickColour;
        ctx.lineWidth = borderW;
        ctx.fillRect(obs.x, 0, obs.width, topBodyH);
        ctx.strokeRect(obs.x, 0, obs.width, topBodyH);
        // Wick extending downward (into gap)
        ctx.beginPath();
        ctx.moveTo(obs.x + obs.width / 2, topBodyH);
        ctx.lineTo(obs.x + obs.width / 2, topHeight);
        ctx.stroke();

        // --- Bottom bar ---
        const bottomBodyY = bottomY + wickLen;
        const bottomBodyH = bottomHeight - wickLen;
        // Vertical gradient: light green top → dark green bottom
        const bottomGrad = ctx.createLinearGradient(0, bottomBodyY, 0, bottomBodyY + bottomBodyH);
        bottomGrad.addColorStop(0, '#00e676');
        bottomGrad.addColorStop(1, '#009624');
        // Body fill + black border
        ctx.fillStyle = bottomGrad;
        ctx.fillRect(obs.x, bottomBodyY, obs.width, bottomBodyH);
        ctx.strokeRect(obs.x, bottomBodyY, obs.width, bottomBodyH);
        // Wick extending upward (into gap)
        ctx.beginPath();
        ctx.moveTo(obs.x + obs.width / 2, bottomY);
        ctx.lineTo(obs.x + obs.width / 2, bottomBodyY);
        ctx.stroke();
      }

      // --- Ripple rings (score effect) ---
      for (const r of game.ripples) {
        const progress = 1 - r.timer / r.duration;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0, 212, 170, ${0.5 * (1 - progress)})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // (Score drawn in HUD strip below)

      // --- Exhaust smoke particles (radial-gradient, behind player) ---
      for (const p of game.particles) {
        // Colour/lifecycle curve: muzzle flash fire blast → dark gray → light gray → transparent
        let r, g, b, alpha, drawR;
        if (p.life > 0.85) {
          // life 1.0→0.85: lighter warm orange core (#FF8800), alpha 0.95
          r = 255; g = 136; b = 0;
          alpha = 0.95;
          drawR = p.size;
        } else if (p.life > 0.75) {
          // life 0.85→0.75: transition to deep warm orange (#FF5500), alpha 0.9
          const t = 1 - (p.life - 0.75) / 0.10;
          g = Math.round(136 + (85 - 136) * t);
          r = 255; b = 0;
          alpha = 0.9;
          drawR = p.size;
        } else if (p.life > 0.5) {
          // life 0.75→0.5: dark gray smoke (#222→#444), medium, alpha 0.6
          const t = 1 - (p.life - 0.5) / 0.25;
          const gray = Math.round(0x22 + (0x44 - 0x22) * t);
          r = gray; g = gray; b = gray;
          alpha = 0.6;
          drawR = p.size;
        } else if (p.life > 0.2) {
          // life 0.5→0.2: light gray smoke (#777→#aaa), large, alpha 0.3
          const t = 1 - (p.life - 0.2) / 0.3;
          const gray = Math.round(0x77 + (0xaa - 0x77) * t);
          r = gray; g = gray; b = gray;
          alpha = 0.3;
          drawR = p.size;
        } else {
          // life 0.2→0.0: fading to transparent, extra large
          r = 170; g = 170; b = 170;
          alpha = (p.life / 0.2) * 0.3;
          drawR = p.size;
        }

        ctx.globalAlpha = Math.min(alpha, 1);
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, drawR);
        grad.addColorStop(0, `rgb(${r},${g},${b})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, drawR, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;

      // Player — sprite image with smoothed velocity-based tilt (with fallback rectangle)
      const tiltAngle = player.tiltAngle;
      if (playerImageLoaded) {
        ctx.save();
        // Rotate around visual center (120x120 sprite centered on 100x100 collision)
        const cx = player.x + 50;
        const cy = player.y + 50;
        ctx.translate(cx, cy);
        ctx.rotate(tiltAngle);
        ctx.drawImage(playerImage, -60, -60, 120, 120);
        ctx.restore();
      } else {
        // Fallback: rotate collision rectangle around its center
        ctx.save();
        const cx2 = player.x + player.width / 2;
        const cy2 = player.y + player.height / 2;
        ctx.translate(cx2, cy2);
        ctx.rotate(tiltAngle);
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
        ctx.restore();
      }

      // --- Score with rainbow glow + black outline ---
      const scoreText = '1 NMR ≈ $' + game.score;
      ctx.font = 'bold 32px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000000';

      // Rainbow glow on score pop
      if (game.scorePopTimer > 0) {
        const progress = game.scorePopTimer / 500;
        const blur = Math.round(40 * progress);
        const hue = game.rainbowHue;
        ctx.save();
        ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
        ctx.shadowBlur = blur;
        ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
        ctx.fillText(scoreText, 20, 50);
        ctx.shadowBlur = 0;
        ctx.strokeText(scoreText, 20, 50);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(scoreText, 20, 50);
        ctx.restore();
      } else {
        ctx.strokeText(scoreText, 20, 50);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(scoreText, 20, 50);
      }
    }

    function drawGameOver() {
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Score panel
      const panelW = 320;
      const panelH = 200;
      const panelX = (LOGICAL_WIDTH - panelW) / 2;
      const panelY = (LOGICAL_HEIGHT - panelH) / 2 - 30;

      // Panel background
      ctx.fillStyle = 'rgba(10, 14, 23, 0.9)';
      ctx.strokeStyle = '#00d4aa';
      ctx.lineWidth = 2;
      ctx.fillRect(panelX, panelY, panelW, panelH);
      ctx.strokeRect(panelX, panelY, panelW, panelH);

      // Game Over text
      ctx.font = 'bold 36px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000000';
      ctx.strokeText('GAME OVER', LOGICAL_WIDTH / 2, panelY + 60);
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('GAME OVER', LOGICAL_WIDTH / 2, panelY + 60);

      // Score
      ctx.font = 'bold 24px Courier New, monospace';
      ctx.strokeText('1 NMR ≈ $' + game.score, LOGICAL_WIDTH / 2, panelY + 110);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('1 NMR ≈ $' + game.score, LOGICAL_WIDTH / 2, panelY + 110);

      // Restart prompt
      ctx.font = '16px Courier New, monospace';
      ctx.strokeText('Press SPACE or Tap to Restart', LOGICAL_WIDTH / 2, panelY + 160);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.fillText('Press SPACE or Tap to Restart', LOGICAL_WIDTH / 2, panelY + 160);
    }

    // --- Game Loop ---
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - game.lastTime) / 16.667, 3); // cap at 3 frames
      game.lastTime = timestamp;

      update(dt);
      draw();

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
