<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerocket</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e17;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      margin: auto;
      image-rendering: pixelated;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" role="img" aria-label="Numerocket game — navigate an alligator rocket through stock-chart obstacles. Press Space or tap to jump.">
    <p>Numerocket — a Flappy Bird-style game with a Numerai data-science theme. Requires JavaScript and a modern browser.</p>
  </canvas>
  <div id="rotate-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,14,23,0.85);z-index:10;pointer-events:none;align-items:center;justify-content:center;flex-direction:column;">
    <div style="font-size:48px;margin-bottom:16px;text-align:center;">↻</div>
    <div style="font-family:'Courier New',monospace;color:#ffffff;font-size:20px;text-align:center;">Please rotate your device</div>
  </div>
  <script>
    // --- Canvas setup ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // Logical game resolution (coordinates stay 400×600)
    const LOGICAL_WIDTH = 400;
    const LOGICAL_HEIGHT = 600;

    canvas.width = LOGICAL_WIDTH;
    canvas.height = LOGICAL_HEIGHT;

    // Auto-resize: fill viewport height, maintain 2:3, DPR-aware
    const MIN_WIDTH = 200;
    const MIN_HEIGHT = 300;
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      // Calculate display size — full viewport height, 2:3 width
      let displayHeight = window.innerHeight;
      let displayWidth = Math.round(displayHeight * 2 / 3);

      // Clamp width to viewport (portrait / ultrawide safety)
      if (displayWidth > window.innerWidth) {
        displayWidth = window.innerWidth;
        displayHeight = Math.round(displayWidth * 3 / 2);
      }

      // Enforce minimum canvas size guard
      displayWidth = Math.max(MIN_WIDTH, displayWidth);
      displayHeight = Math.max(MIN_HEIGHT, displayHeight);

      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayHeight + 'px';

      // Scale pixel buffer for Retina sharpness
      canvas.width = Math.round(LOGICAL_WIDTH * dpr);
      canvas.height = Math.round(LOGICAL_HEIGHT * dpr);

      // Scale context so all game code still works in 400×600 coords
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // Resize on load and on window change (debounced)
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(resizeCanvas, 100);
    });
    resizeCanvas();

    // --- Sound Effects (Web Audio API chiptune) ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        try { audioCtx = new AudioCtx(); }
        catch (e) { console.warn('AudioContext creation failed:', e); return; }
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // Helper: play a single oscillator tone
    function playTone(freq, type, duration, slide, vol) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + duration);
      gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    // Helper: white noise burst
    function playNoise(duration, vol) {
      if (!audioCtx) return;
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start();
    }

    // --- Sound FX (A2 — Pepe Meme-Aware Chiptune) ---

    // 🐸 D1 — Boing: descending spring then bounce-back
    function sfxRibbit() {
      initAudio();
      // Descending 600→100Hz (spring stretch)
      playTone(600, 'sine', 0.06, 100, 0.06);
      // Bounce back 100→400Hz (spring recoil)
      setTimeout(() => playTone(100, 'sine', 0.06, 400, 0.04), 55);
    }

    // 📈 G2 — Triple Blip: three rising square beeps
    function sfxDing() {
      initAudio();
      playTone(400, 'square', 0.05, null, 0.12);
      setTimeout(() => playTone(600, 'square', 0.05, null, 0.12), 50);
      setTimeout(() => playTone(800, 'square', 0.06, null, 0.14), 100);
    }

    // 💥 Sad trombone death: descending sawtooth
    function sfxDeath() {
      initAudio();
      // Descending from 600Hz → 100Hz over 500ms
      playTone(600, 'sawtooth', 0.5, 100, 0.12);
      // Low rumble on top
      setTimeout(() => playTone(80, 'square', 0.3, 40, 0.06), 50);
    }

    // 🎮 Start arpeggio: C-E-G chiptune style
    function sfxStart() {
      initAudio();
      playTone(523, 'square', 0.1, null, 0.10);  // C5
      setTimeout(() => playTone(659, 'square', 0.1, null, 0.10), 80);  // E5
      setTimeout(() => playTone(784, 'square', 0.15, null, 0.10), 160); // G5
    }

    // 🚀 Level up: rising octave sweep
    function sfxLevelUp() {
      initAudio();
      playTone(440, 'triangle', 0.15, 880, 0.12);
      setTimeout(() => playTone(880, 'triangle', 0.2, 1320, 0.10), 120);
    }

    // --- Constants ---
    const GRAVITY = 0.5;
    const JUMP_VELOCITY = -8;
    const GAP_SIZE_INITIAL_MIN = 250;
    const GAP_SIZE_INITIAL_MAX = 270;
    const GAP_SIZE_FLOOR_MIN = 220;
    const GAP_SIZE_FLOOR_MAX = 240;
    const GAP_SCALE_INTERVAL = 5;   // shrink every N obstacles
    const GAP_SCALE_STEP = 2;       // px shrink per interval
    function getGapSize() {
      const steps = Math.floor(game.score / GAP_SCALE_INTERVAL);
      const min = Math.max(GAP_SIZE_FLOOR_MIN, GAP_SIZE_INITIAL_MIN - steps * GAP_SCALE_STEP);
      const max = Math.max(GAP_SIZE_FLOOR_MAX, GAP_SIZE_INITIAL_MAX - steps * GAP_SCALE_STEP);
      return min + Math.floor(Math.random() * (max - min + 1));
    }  // Vertical gap scales down with score
    const TIER_INTERVAL = 10;        // obstacles per tier
    const TIER_NAMES = ['Apprentice', 'Contributor', 'Researcher', 'Expert', 'Master', 'Grandmaster'];
    const TIER_COLORS = ['#737373', '#4DB8FF', '#00E5FF', '#44E76B', '#B388FF', '#FFE100'];
    const TIER_SPEEDS = [3.6, 3.8, 4.0, 4.2, 4.4, 4.6];
    function getTier() {
      const maxIndex = TIER_NAMES.length - 1;
      const rawIndex = Math.floor(game.score / TIER_INTERVAL);
      const index = Math.min(maxIndex, rawIndex);
      const rounds = rawIndex > maxIndex ? rawIndex - maxIndex + 1 : 1;
      const multiplier = rounds > 1 ? ' x' + rounds : '';
      const baseSpeed = rawIndex < TIER_SPEEDS.length ? TIER_SPEEDS[rawIndex] : TIER_SPEEDS[maxIndex] + (rawIndex - maxIndex) * 0.2;
      return {
        index,
        name: TIER_NAMES[index] + multiplier,
        color: TIER_COLORS[index],
        speed: Math.min(baseSpeed, 7.0),
      };
    }
    function getSpeed(tier) { if (!tier) tier = getTier(); return tier.speed; }
    const DT_TO_MS = 16.667;
    const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const SPAWN_INTERVAL_MIN = 90;
    const SPAWN_INTERVAL_MAX = 120;
    const PLAYER_X = 80;
    const PLAYER_WIDTH = 100;
    const PLAYER_HEIGHT = 100;

    // --- Particle gradient cache (pre-rendered at setup, 6 tiers × 5 stages = 30 canvases) ---
    // Tier colours are blended into the smoke stages (2-4) so the exhaust plume
    // carries the tier identity. Fire core stages (0-1) stay orange.
    const PARTICLE_CACHE_RADIUS = 16;
    const particleGradientCache = (function buildParticleGradientCache() {
      // Base stage colours (fire core unchanged, grey smoke becomes tier-tinted)
      var stages = [
        { r: 255, g: 212, b: 68 },   // stage 0 — orange-yellow fire core
        { r: 255, g: 136, b: 0 },    // stage 1 — deep orange
        { r:  51, g:  51, b: 51 },   // stage 2 — dark gray smoke
        { r: 153, g: 153, b: 153 },  // stage 3 — light gray smoke
        { r: 170, g: 170, b: 170 },  // stage 4 — fading gray
      ];
      // Tier blend weight per stage: 0 = no tier colour (fire core stays orange)
      var blendWeights = [0, 0, 0.8, 0.7, 0.5];
      // Warm tint for Apprentice (grey #737373 + warm #664422 so it reads as dim exhaust)
      var apprenticeWarm = { r: 0x66, g: 0x44, b: 0x22 };

      // Linear-interpolate two RGB colours by weight t (0 = a, 1 = b)
      function lerpColor(a, b, t) {
        return {
          r: Math.round(a.r + (b.r - a.r) * t),
          g: Math.round(a.g + (b.g - a.g) * t),
          b: Math.round(a.b + (b.b - a.b) * t),
        };
      }

      // Parse hex colour string (#RRGGBB) to RGB object
      function hexToRgb(hex) {
        return {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16),
        };
      }

      var result = [];
      var cacheSize = PARTICLE_CACHE_RADIUS * 2;

      for (var tierIdx = 0; tierIdx < TIER_COLORS.length; tierIdx++) {
        var tierRgb = hexToRgb(TIER_COLORS[tierIdx]);

        for (var stage = 0; stage < 5; stage++) {
          var baseColor = stages[stage];
          var bw = blendWeights[stage];
          var color;

          if (bw === 0) {
            // Fire core stages — unchanged
            color = baseColor;
          } else {
            // Smoke stages — blend base grey with tier colour
            color = lerpColor(baseColor, tierRgb, bw);
            // Apprentice tier: add warm tint so grey-on-grey is visible
            if (tierIdx === 0) {
              color = lerpColor(color, apprenticeWarm, 0.4);
            }
          }

          var canvas = document.createElement('canvas');
          canvas.width = cacheSize;
          canvas.height = cacheSize;
          var cx = canvas.getContext('2d');
          var grad = cx.createRadialGradient(
            PARTICLE_CACHE_RADIUS, PARTICLE_CACHE_RADIUS, 0,
            PARTICLE_CACHE_RADIUS, PARTICLE_CACHE_RADIUS, PARTICLE_CACHE_RADIUS
          );
          grad.addColorStop(0, 'rgb(' + color.r + ',' + color.g + ',' + color.b + ')');
          grad.addColorStop(1, 'rgba(0,0,0,0)');
          cx.fillStyle = grad;
          cx.fillRect(0, 0, cacheSize, cacheSize);
          result.push(canvas);
        }
      }
      return result;
    })();

    // --- Glow overlay cache (6 tiers × 1 stage = 6 canvases, drawn on top of every particle) ---
    // Each canvas is a 32x32 radial gradient: warm orange center → tier-coloured mid-ring → transparent edge
    // Approach 2: dual-radial gradient — preserves orange core while adding coloured outer rim
    const particleGlowCache = (function buildParticleGlowCache() {
      var result = [];
      var cacheSize = PARTICLE_CACHE_RADIUS * 2;
      var centerR = PARTICLE_CACHE_RADIUS;

      for (var tierIdx = 0; tierIdx < TIER_COLORS.length; tierIdx++) {
        var hex = TIER_COLORS[tierIdx];
        var tr = parseInt(hex.slice(1, 3), 16);
        var tg = parseInt(hex.slice(3, 5), 16);
        var tb = parseInt(hex.slice(5, 7), 16);

        var canvas = document.createElement('canvas');
        canvas.width = cacheSize;
        canvas.height = cacheSize;
        var cx = canvas.getContext('2d');
        var grad = cx.createRadialGradient(centerR, centerR, 0, centerR, centerR, centerR);
        grad.addColorStop(0, 'rgba(255, 180, 50, 1.0)');
        grad.addColorStop(0.4, 'rgba(' + tr + ',' + tg + ',' + tb + ', 0.8)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        cx.fillStyle = grad;
        cx.fillRect(0, 0, cacheSize, cacheSize);
        result.push(canvas);
      }
      return result;
    })();

    // --- Pre-rendered CRT scanline overlay (single drawImage instead of 150 fillRect calls) ---
    const scanlineCanvas = (function buildScanlineCanvas() {
      var canvas = document.createElement('canvas');
      canvas.width = LOGICAL_WIDTH;
      canvas.height = LOGICAL_HEIGHT;
      var slCtx = canvas.getContext('2d');
      slCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      for (var y = 0; y < LOGICAL_HEIGHT; y += 4) {
        slCtx.fillRect(0, y, LOGICAL_WIDTH, 2);
      }
      return canvas;
    })();

    // --- Tier symbols for colour-blind accessibility ---
    const TIER_SYMBOLS = ['-', '\u25CF', '\u25B2', '\u25A0', '\u25C6', '\u2605'];

    // --- Game state ---
    const State = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };

    const game = {
      state: State.MENU,
      score: 0,
      comboCount: 0,
      obstacles: [],
      spawnTimer: 0,
      spawnInterval: SPAWN_INTERVAL_MIN,
      lastTime: 0,
      deathTimer: 0,
      scorePopTimer: 0,
      rainbowHue: 0,
      bgOffset: 0,
      particles: [],
      rings: [],
      sparks: [],
      screenFlash: 0,
      glowIntensity: 0,
      redStreakStart: -1,
      redStreakLength: 0,
      redDriftDirection: 0,
      obstacleCountInTier: 0,
      skinsInTier: 0,
      greenStartCount: 2, // first 2 obstacles always green, no skin
    };

    // --- Player ---
    const player = {
      x: PLAYER_X,
      y: 0,
      width: PLAYER_WIDTH,
      height: PLAYER_HEIGHT,
      velocityY: 0,
      tiltAngle: 0,
    };

    function resetGame() {
      player.y = LOGICAL_HEIGHT / 2;
      player.velocityY = 0;
      game.score = 0;
      game.comboCount = 0;
      game.obstacles = [];
      game.spawnTimer = 0;
      game.spawnInterval = SPAWN_INTERVAL_MIN;
      game.particles = [];
      game.scorePopTimer = 0;
      game.deathTimer = 0;
      game.bgOffset = 0;
      game.rainbowHue = 0;

      game.rings = [];
      game.sparks = [];
      game.screenFlash = 0;
      game.glowIntensity = 0;
      game.redStreakStart = 4 + Math.floor(Math.random() * 2);  // bars 4-6 in first tier, keeping 1-3 green
      game.redStreakLength = 3;
      game.redDriftDirection = 0;
      game.obstacleCountInTier = 0;
      game.skinsInTier = 0;

      game.lastGapY = null;
      player.tiltAngle = 0;
    }
    resetGame();

    // --- Obstacle skin assets ---
    const obstacleTopImg = new Image();
    obstacleTopImg.src = 'assets/column_rc_top.png';
    const obstacleBotImg = new Image();
    obstacleBotImg.src = 'assets/column_rc_bot.png';
    // --- Player asset ---
    // Image is loaded below and wired into drawGame()
    const PLAYER_IMAGE_SRC = 'assets/player.png';
    const playerImage = new Image();
    let playerImageLoaded = false;
    playerImage.onerror = () => console.warn('Failed to load player image:', PLAYER_IMAGE_SRC);
    playerImage.onload = () => { playerImageLoaded = true; };
    playerImage.src = PLAYER_IMAGE_SRC;
    // --- Background asset ---
    const BACKGROUND_IMAGE_SRC = 'assets/background.jpg';
    const bgImage = new Image();
    let bgImageLoaded = false;
    let bgNaturalW = 1200;
    let bgNaturalH = 600;
    bgImage.onload = () => {
      bgImageLoaded = true;
      bgNaturalW = bgImage.naturalWidth;
      bgNaturalH = bgImage.naturalHeight;
    };
    bgImage.onerror = () => console.warn('Failed to load background image:', BACKGROUND_IMAGE_SRC);
    bgImage.src = BACKGROUND_IMAGE_SRC;

    // --- Input ---
    function handleJump() {
      if (game.state === State.MENU) {
        sfxStart();
        game.state = State.PLAYING;
        resetGame();
        player.velocityY = JUMP_VELOCITY;
      } else if (game.state === State.PLAYING) {
        sfxRibbit();
        player.velocityY = JUMP_VELOCITY;
      } else if (game.state === State.GAME_OVER) {
        game.state = State.MENU;
        game.deathTimer = 0;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
        e.preventDefault();
        handleJump();
      }
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleJump();
    }, { passive: false });

    canvas.addEventListener('click', (e) => {
      e.preventDefault();
      handleJump();
    });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    function checkCollision(a, b) {
      const padding = 8; // fairness padding — makes game easier
      return a.x < b.x + b.width - padding &&
             a.x + a.width > b.x + padding &&
             a.y < b.y + b.height - padding &&
             a.y + a.height > b.y + padding;
    }

    function spawnObstacle() {
      game.obstacleCountInTier++;
      const isRedStreak = game.redStreakStart !== -1 &&
        game.obstacleCountInTier >= game.redStreakStart &&
        game.obstacleCountInTier < game.redStreakStart + game.redStreakLength;
      const MIN_BAR_HEIGHT = 90; // min bar height — keeps HUD area clear
      const gapSize = getGapSize();
      const minGapY = MIN_BAR_HEIGHT + gapSize / 2;
      const maxGapY = LOGICAL_HEIGHT - MIN_BAR_HEIGHT - gapSize / 2;
      const MIN_GAP_DISTANCE = 100; // minimum vertical distance between consecutive gaps
      let gapY = minGapY + Math.random() * (maxGapY - minGapY);
      // Enforce minimum vertical distance from previous gap
      if (game.lastGapY !== null) {
        const tooClose = Math.abs(gapY - game.lastGapY) < MIN_GAP_DISTANCE;
        if (tooClose) {
          // Push gapY away from lastGapY by exactly MIN_GAP_DISTANCE
          if (gapY < game.lastGapY) {
            gapY = game.lastGapY - MIN_GAP_DISTANCE;
          } else {
            gapY = game.lastGapY + MIN_GAP_DISTANCE;
          }
          // Clamp to valid range
          gapY = Math.max(minGapY, Math.min(maxGapY, gapY));
        }
      }
      game.lastGapY = gapY;

      // Tweak 2: directional gap drift for red bars
      if (isRedStreak) {
        const redStreakIdx = game.obstacleCountInTier - game.redStreakStart;
        if (redStreakIdx === 0) {
          game.redDriftDirection = Math.random() < 0.5 ? -1 : 1;
        }
        // No vertical drift — red bar gaps are clustered at the same height
        // (no gapY shift)
      }

      // Skin frequency: at least 1 per tier, max 2 (non-red only)
      let hasSkin = false;
      if (game.greenStartCount > 0) {
        game.greenStartCount--;
      } else if (!isRedStreak) {
        if (game.skinsInTier >= 2) {
          hasSkin = false;
        } else if (game.skinsInTier === 0 && game.obstacleCountInTier >= 5) {
          hasSkin = true; // force first by mid-tier
        } else {
          hasSkin = Math.random() < 0.15;
        }
        if (hasSkin) game.skinsInTier++;
      }

      game.obstacles.push({
        x: LOGICAL_WIDTH,
        gapY: gapY,
        gapSize: gapSize,
        width: 60,
        scored: false,
        isRed: isRedStreak,
        skin: hasSkin,
      });
    }

    // --- Update ---
    function update(dt) {
      if (game.state === State.PLAYING) {
        // Cache tier once per frame
        const currentTier = getTier();
        const currentSpeed = currentTier.speed;

        // Player physics
        player.velocityY += GRAVITY * dt;
        player.y += player.velocityY * dt;

        // Ceiling clamp
        if (player.y < 0) player.y = 0;

        // Ground check — clamp y before game-over to prevent clipping
        if (player.y + player.height > LOGICAL_HEIGHT) {
          player.y = LOGICAL_HEIGHT - player.height;
          sfxDeath();
          game.state = State.GAME_OVER;
        }

        // Parallax background scroll (30% of obstacle speed), wrap to keep bounded
        game.bgOffset = (game.bgOffset + currentSpeed * 0.3 * dt) % (bgNaturalW || 1200);

        // Spawn obstacles (dt-accumulated timer)
        game.spawnTimer += dt;
        if (game.spawnTimer >= game.spawnInterval) {
          spawnObstacle();
          // Next spawn interval: tighter (40-60) if next obstacle is in the red streak
          const nextObs = game.obstacleCountInTier + 1;
          const nextInStreak = game.redStreakStart !== -1 &&
            nextObs >= game.redStreakStart &&
            nextObs < game.redStreakStart + game.redStreakLength;
          if (nextInStreak) {
            // Tweak 1: prep space before the first red obstacle
            if (nextObs === game.redStreakStart) {
              game.spawnInterval = 100 + Math.floor(Math.random() * 21);
            } else {
              game.spawnInterval = 65 + Math.floor(Math.random() * 21);
            }
          } else {
            game.spawnInterval = SPAWN_INTERVAL_MIN + Math.floor(Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN));
          }
          game.spawnTimer = 0;
        }

        // Move obstacles
        for (let i = game.obstacles.length - 1; i >= 0; i--) {
          const obs = game.obstacles[i];
          obs.x -= currentSpeed * dt;

          // Scoring
          if (!obs.scored && obs.x + obs.width < player.x) {
            obs.scored = true;
            game.score++;
            game.comboCount++;
            game.scorePopTimer = 500;
            if (game.score % TIER_INTERVAL === 0) {
              // Tier promotion — dual shockwave rings + screen flash + fanfare
              const tierIdx = Math.min(TIER_NAMES.length - 1, Math.floor(game.score / TIER_INTERVAL));
              const cx = player.x + PLAYER_WIDTH / 2;
              const cy = player.y + PLAYER_HEIGHT / 2;
              // Ring 1 — immediate, wide, thick
              game.rings.push({
                x: cx, y: cy,
                radius: 0,
                maxRadius: 220,
                timer: 35,
                duration: 35,
                color: TIER_COLORS[tierIdx],
                startWidth: 10,
                endWidth: 4,
                startAlpha: 1.0,
                endAlpha: 0.0,
              });
              // Ring 2 — offset delay (timer < duration = starts mid-expansion)
              game.rings.push({
                x: cx, y: cy,
                radius: 0,
                maxRadius: 180,
                timer: 25,
                duration: 35,
                color: TIER_COLORS[tierIdx],
                startWidth: 8,
                endWidth: 3,
                startAlpha: 0.8,
                endAlpha: 0.0,
              });
              game.screenFlash = 8;
              game.glowIntensity = 20;
              sfxLevelUp();
              game.comboCount = 0;
              // Start a new 3-bar red streak: bars 2-5 within this tier
              game.redStreakStart = 2 + Math.floor(Math.random() * 4);
              game.redStreakLength = 3;
              game.obstacleCountInTier = 0;
              game.skinsInTier = 0;
            }
            // Regular score sound
            sfxDing();
          }

          // Collision detection
          const topBar = { x: obs.x, y: 0, width: obs.width, height: obs.gapY - obs.gapSize / 2 };
          const bottomBar = { x: obs.x, y: obs.gapY + obs.gapSize / 2, width: obs.width, height: LOGICAL_HEIGHT - (obs.gapY + obs.gapSize / 2) };

          if (checkCollision(player, topBar) || checkCollision(player, bottomBar)) {
            sfxDeath();
            game.state = State.GAME_OVER;
          }

          // Remove off-screen
          if (obs.x + obs.width < 0) {
            game.obstacles.splice(i, 1);
          }
        }

        // --- Exhaust smoke particles ---
        // Spawn particles behind the rocket nozzle (more during boost)
        const particleTier = Math.floor(game.score / TIER_INTERVAL);
        const particleTierIndex = Math.min(TIER_NAMES.length - 1, particleTier);
        let spawnCount = Math.min(2 + Math.floor(particleTier / 2), 4);
        if (REDUCED_MOTION) spawnCount = Math.min(1, spawnCount);
        const minSize = 5;
        const maxSize = 8;
        const warmth = Math.min(1, particleTier / 6);
        for (let i = 0; i < spawnCount; i++) {
          game.particles.push({
            x: player.x - 1 + Math.random() * 8,
            y: player.y + 71 + Math.random() * 10,
            life: 1.0,
            size: minSize + Math.random() * (maxSize - minSize),
            vx: -(4 + Math.random() * 4),
            vy: 1.5 + Math.random() * 2.5,
            warmth: warmth,
            tierIndex: particleTierIndex,
          });
        }
        // Cap at 200 particles (50 with reduced motion)
        const maxParticles = REDUCED_MOTION ? 50 : 200;
        if (game.particles.length > maxParticles) {
          game.particles.splice(0, game.particles.length - maxParticles);
        }
        // Update existing particles
        for (let i = game.particles.length - 1; i >= 0; i--) {
          const p = game.particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          // Upward buoyancy: hot gas rises — stronger as smoke ages
          p.vy -= 0.02 * dt;
          // Turbulence jitter
          p.vx += (Math.random() - 0.5) * 0.2;
          p.vy += (Math.random() - 0.5) * 0.2;
          p.life -= 0.02 * dt;
          // Size expands as smoke ages and spreads
          if (p.life < 0.75) p.size += 0.03 * dt;
          if (p.life < 0.5)  p.size += 0.04 * dt;
          if (p.life < 0.2)  p.size += 0.05 * dt;
          if (p.size > 16)   p.size = 16;
          if (p.life <= 0) {
            game.particles.splice(i, 1);
          }
        }

        // --- Tier-coloured additive sparks (continuous — Approach C) ---
        if (!REDUCED_MOTION) {
          const sparkTierIdx = currentTier.index;
          
          // Continuous per-frame spawn: tier-based count
          let sparkCount = sparkTierIdx + 1;
          // Cap at 60 total
          sparkCount = Math.min(sparkCount, 60 - game.sparks.length);
          
          for (let i = 0; i < sparkCount; i++) {
            game.sparks.push({
              x: player.x - 1 + Math.random() * 8,
              y: player.y + 71 + Math.random() * 10,
              life: 0.36 + Math.random() * 0.36,
              maxLife: 0,
              size: 2 + Math.random() * 3,
              vx: -(5 + Math.random() * 5), // -5 to -10
              vy: -3 + Math.random() * 11,   // -3 to +8
            });
            const sp = game.sparks[game.sparks.length - 1];
            sp.maxLife = sp.life;
          }
        }
        // Update sparks
        for (let i = game.sparks.length - 1; i >= 0; i--) {
          const s = game.sparks[i];
          s.x += s.vx * dt;
          s.y += s.vy * dt;
          s.vy += 0.05 * dt; // slight downward drift
          s.life -= 0.02 * dt;
          if (s.life <= 0) {
            game.sparks.splice(i, 1);
          }
        }

        // Smooth tilt: lerp toward velocity-based target
        const targetTilt = player.velocityY * 0.025;
        player.tiltAngle += (targetTilt - player.tiltAngle) * 0.15;
      }

      // Track death timer for shake/flash effect
      if (game.state === State.GAME_OVER) {
        game.deathTimer += dt * DT_TO_MS;
      }

      // Decrement score pop timer
      if (game.scorePopTimer > 0) {
        game.scorePopTimer -= dt * DT_TO_MS;
        if (game.scorePopTimer < 0) game.scorePopTimer = 0;
      }

      // Update shockwave rings
      for (let i = game.rings.length - 1; i >= 0; i--) {
        const r = game.rings[i];
        r.timer -= dt;
        r.radius = r.maxRadius * (1 - r.timer / r.duration);
        if (r.timer <= 0) {
          game.rings.splice(i, 1);
        }
      }

      // Screen flash fade
      if (game.screenFlash > 0) {
        game.screenFlash -= dt;
        if (game.screenFlash < 0) game.screenFlash = 0;
      }

      // Glow intensity fade (spikes on tier promotion, decays to steady 8)
      if (game.glowIntensity > 8) {
        game.glowIntensity -= 0.6 * dt;
        if (game.glowIntensity < 8) game.glowIntensity = 8;
      }

      // Cycle rainbow hue for score-pop glow
      game.rainbowHue = (game.rainbowHue + 2) % 360;
    }

    // --- Draw ---
    function draw() {
      // Shake effect on death (±1.5px for 200ms — gentle arcade feedback)
      const shaking = !REDUCED_MOTION && game.deathTimer > 0 && game.deathTimer < 200;
      if (shaking) {
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3);
      }

      // Background fill (fallback if bg image hasn't loaded)
      ctx.fillStyle = '#0a0e17';
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Parallax background image (scrolls at 30% of obstacle speed)
      if (bgImageLoaded) {
        const bgW = bgNaturalW * (LOGICAL_HEIGHT / bgNaturalH);
        const bgH = LOGICAL_HEIGHT;
        const bgX = -(game.bgOffset % bgW);
        ctx.drawImage(bgImage, 0, 0, bgNaturalW, bgNaturalH, Math.round(bgX), 0, Math.round(bgW), bgH);
        ctx.drawImage(bgImage, 0, 0, bgNaturalW, bgNaturalH, Math.round(bgX + bgW) - 1, 0, Math.round(bgW) + 2, bgH);
      }

      if (game.state === State.MENU) {
        drawMenu();
      } else if (game.state === State.PLAYING || game.state === State.GAME_OVER) {
        drawGame();
      }

      if (game.state === State.GAME_OVER) {
        drawGameOver();
      }

      // End shake transform
      if (shaking) {
        ctx.restore();
      }

      // Screen flash (brief tint on level up)
      if (game.screenFlash > 0) {
        ctx.fillStyle = `rgba(255, 200, 100, ${0.12 * (game.screenFlash / 8)})`;
        ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
      }

      if (!REDUCED_MOTION) {
        // CRT scanline overlay (pre-rendered offscreen canvas, single drawImage)
        ctx.drawImage(scanlineCanvas, 0, 0);
      }
    }

    let bestScore = 0;

    function drawMenu() {
      if (game.score > bestScore) bestScore = game.score;
      ctx.textAlign = 'center';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000000';

      // Player sprite above title
      if (playerImageLoaded) {
        const spriteSize = 120;
        const spriteY = LOGICAL_HEIGHT / 2 - 150;
        ctx.drawImage(playerImage, LOGICAL_WIDTH / 2 - spriteSize / 2, spriteY, spriteSize, spriteSize);
      }

      if (bestScore > 0) {
        ctx.font = 'bold 18px Courier New, monospace';
        ctx.strokeText('Best Score: 1 NMR ≈ $' + bestScore, LOGICAL_WIDTH / 2, 30);
        ctx.fillStyle = '#00d4aa';
        ctx.fillText('Best Score: 1 NMR ≈ $' + bestScore, LOGICAL_WIDTH / 2, 30);
      }
      ctx.font = 'bold 48px Courier New, monospace';
      ctx.strokeText('NUMEROCKET', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 30);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('NUMEROCKET', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 30);
      // Subtitle — two rows, 18px white + black outline (same as prompt)
      ctx.font = '18px Courier New, monospace';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000000';
      ctx.strokeText('  Ride the market and  ', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 2);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('  Ride the market and  ', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 2);
      ctx.strokeText('  send NMR to the moon  ', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 20);
      ctx.fillText('  send NMR to the moon  ', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 20);
      ctx.font = '18px Courier New, monospace';
      ctx.lineWidth = 3;
      ctx.strokeText('Press SPACE or Tap to Start', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 240);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Press SPACE or Tap to Start', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 240);
      // Version footer
      ctx.font = '14px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000000';
      ctx.strokeText('Prototype v0.6.4', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT - 15);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.60)';
      ctx.fillText('Prototype v0.6.4', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT - 15);
    }

    function drawGame() {
      // --- Obstacles (candlestick-chart style) ---
      for (const obs of game.obstacles) {
        const topHeight = obs.gapY - obs.gapSize / 2;
        const bottomY = obs.gapY + obs.gapSize / 2;
        const bottomHeight = LOGICAL_HEIGHT - bottomY;

        const wickColour = '#000000';
        const wickLen = 10;
        const borderW = 3;

        // --- Top bar ---
        const topBodyH = topHeight - wickLen;
        // Body fill (gradient or sprite image)
        if (!obs.skin) {
          const topGrad = ctx.createLinearGradient(0, 0, 0, topBodyH);
          if (obs.isRed) {
            topGrad.addColorStop(0, '#b71c1c');
            topGrad.addColorStop(1, '#f44336');
          } else {
            topGrad.addColorStop(0, '#009624');
            topGrad.addColorStop(1, '#00e676');
          }
          ctx.fillStyle = topGrad;
          ctx.fillRect(obs.x, 0, obs.width, topBodyH);
          // Black border
          ctx.strokeStyle = wickColour;
          ctx.lineWidth = borderW;
          ctx.strokeRect(obs.x, 0, obs.width, topBodyH);
          // Wick extending downward (into gap)
          ctx.beginPath();
          ctx.moveTo(obs.x + obs.width / 2, topBodyH);
          ctx.lineTo(obs.x + obs.width / 2, topHeight);
          ctx.stroke();
        } else {
          // Sprite at natural size, anchored at gap edge, clipped to bar bounds
          ctx.save();
          ctx.beginPath();
          ctx.rect(obs.x, 0, obs.width, topHeight);
          ctx.clip();
          // 3px black outline tracing the sprite edge (offset blit)
          ctx.filter = 'brightness(0)';
          ctx.drawImage(obstacleTopImg, obs.x - 3, topHeight - 310);
          ctx.drawImage(obstacleTopImg, obs.x + 3, topHeight - 310);
          ctx.drawImage(obstacleTopImg, obs.x, topHeight - 313);
          ctx.drawImage(obstacleTopImg, obs.x, topHeight - 307);
          ctx.drawImage(obstacleTopImg, obs.x - 2, topHeight - 312);
          ctx.drawImage(obstacleTopImg, obs.x + 2, topHeight - 312);
          ctx.drawImage(obstacleTopImg, obs.x - 2, topHeight - 308);
          ctx.drawImage(obstacleTopImg, obs.x + 2, topHeight - 308);
          ctx.filter = 'none';
          ctx.drawImage(obstacleTopImg, obs.x, topHeight - 310);
          ctx.restore();
        }

        // --- Bottom bar ---
        const bottomBodyY = bottomY + wickLen;
        const bottomBodyH = bottomHeight - wickLen;
        // Body fill (gradient or sprite image)
        if (!obs.skin) {
          const bottomGrad = ctx.createLinearGradient(0, bottomBodyY, 0, bottomBodyY + bottomBodyH);
          if (obs.isRed) {
            bottomGrad.addColorStop(0, '#f44336');
            bottomGrad.addColorStop(1, '#b71c1c');
          } else {
            bottomGrad.addColorStop(0, '#00e676');
            bottomGrad.addColorStop(1, '#009624');
          }
          ctx.fillStyle = bottomGrad;
          ctx.fillRect(obs.x, bottomBodyY, obs.width, bottomBodyH);
          // Black border
          ctx.strokeStyle = wickColour;
          ctx.lineWidth = borderW;
          ctx.strokeRect(obs.x, bottomBodyY, obs.width, bottomBodyH);
          // Wick extending upward (into gap)
          ctx.beginPath();
          ctx.moveTo(obs.x + obs.width / 2, bottomY);
          ctx.lineTo(obs.x + obs.width / 2, bottomBodyY);
          ctx.stroke();
        } else {
          // Sprite at natural size, anchored at gap edge, clipped to bar bounds
          ctx.save();
          ctx.beginPath();
          ctx.rect(obs.x, bottomY, obs.width, LOGICAL_HEIGHT - bottomY);
          ctx.clip();
          // 3px black outline tracing the sprite edge (offset blit)
          ctx.filter = 'brightness(0)';
          ctx.drawImage(obstacleBotImg, obs.x - 3, bottomY);
          ctx.drawImage(obstacleBotImg, obs.x + 3, bottomY);
          ctx.drawImage(obstacleBotImg, obs.x, bottomY - 3);
          ctx.drawImage(obstacleBotImg, obs.x, bottomY + 3);
          ctx.drawImage(obstacleBotImg, obs.x - 2, bottomY - 2);
          ctx.drawImage(obstacleBotImg, obs.x + 2, bottomY - 2);
          ctx.drawImage(obstacleBotImg, obs.x - 2, bottomY + 2);
          ctx.drawImage(obstacleBotImg, obs.x + 2, bottomY + 2);
          ctx.filter = 'none';
          ctx.drawImage(obstacleBotImg, obs.x, bottomY);
          ctx.restore();
        }
      }

      // --- Shockwave rings (tier-coloured on level up) ---
      for (const r of game.rings) {
        const progress = r.timer / r.duration;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        // Parse hex color to RGBA with fade
        const hex = r.color || '#FFE100';
        const rCol = parseInt(hex.slice(1, 3), 16);
        const gCol = parseInt(hex.slice(3, 5), 16);
        const bCol = parseInt(hex.slice(5, 7), 16);
        // Per-ring alpha (default: fades in as it expands — old behaviour)
        const startA = r.startAlpha !== undefined ? r.startAlpha : 0.0;
        const endA = r.endAlpha !== undefined ? r.endAlpha : 1.0;
        const alpha = startA * progress + endA * (1 - progress);
        ctx.strokeStyle = `rgba(${rCol}, ${gCol}, ${bCol}, ${alpha})`;
        // Per-ring line width (default: 3→8 — thin start, thick end)
        const startW = r.startWidth !== undefined ? r.startWidth : 3;
        const endW = r.endWidth !== undefined ? r.endWidth : 8;
        ctx.lineWidth = startW * progress + endW * (1 - progress);
        ctx.stroke();
      }

      // (Score drawn in HUD strip below)

      // --- Exhaust smoke particles (radial-gradient, behind player) ---
      for (const p of game.particles) {
        // Colour/lifecycle curve determines stage index into cached gradient palette
        let alpha, drawR, stageIdx;
        if (p.life > 0.85) {
          alpha = 0.95 + 0.05 * p.warmth;
          drawR = p.size * (1.0 + 0.3 * p.warmth);
          stageIdx = 0;
        } else if (p.life > 0.75) {
          alpha = 0.9 + 0.1 * p.warmth;
          drawR = p.size * (1.0 + 0.3 * p.warmth);
          stageIdx = 1;
        } else if (p.life > 0.5) {
          alpha = 0.6 + 0.2 * p.warmth;
          drawR = p.size * (1.0 + 0.2 * p.warmth);
          stageIdx = 2;
        } else if (p.life > 0.2) {
          alpha = 0.3;
          drawR = p.size;
          stageIdx = 3;
        } else {
          alpha = (p.life / 0.2) * 0.3;
          drawR = p.size;
          stageIdx = 4;
        }

        ctx.globalAlpha = Math.min(alpha, 1);
        ctx.drawImage(particleGradientCache[p.tierIndex * 5 + stageIdx], p.x - drawR, p.y - drawR, drawR * 2, drawR * 2);

        // Dual-radial glow overlay — warm orange centre + tier-coloured outer rim (Approach 2)
        if (!REDUCED_MOTION) {
          var glowAlpha, glowScale;
          if (p.life > 0.85) {
            glowAlpha = 0.2;
            glowScale = 1.3;
          } else if (p.life > 0.75) {
            glowAlpha = 0.3;
            glowScale = 1.3;
          } else if (p.life > 0.5) {
            glowAlpha = 0.5;
            glowScale = 1.5;
          } else if (p.life > 0.2) {
            glowAlpha = 0.6;
            glowScale = 1.5;
          } else {
            glowAlpha = 0.7;
            glowScale = 1.5;
          }
          ctx.globalAlpha = glowAlpha;
          ctx.drawImage(particleGlowCache[p.tierIndex], p.x - drawR * glowScale, p.y - drawR * glowScale, drawR * 2 * glowScale, drawR * 2 * glowScale);
        }
      }
      ctx.globalAlpha = 1.0;

      // Get current tier info (used for glow colour & progress bar)
      const tier = getTier();

      // --- Tier-coloured additive sparks (Approach C) ---
      if (!REDUCED_MOTION) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const s of game.sparks) {
          const progress = s.life / s.maxLife;
          const drawSize = Math.max(1, s.size * progress); // shrink over life
          const flicker = Math.sin(s.life * Math.PI * 4); // ember flicker
          const alpha = Math.max(0, (0.5 + 0.5 * flicker) * progress);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = TIER_COLORS[tier.index];
          ctx.fillRect(s.x - drawSize/2, s.y - drawSize/2, drawSize, drawSize);
        }
        ctx.restore();
      }

      // Player — rocket glow + drop shadow for visibility on dark backgrounds
      const tiltAngle = player.tiltAngle;
      if (playerImageLoaded) {
        const cx = player.x + 50;
        const cy = player.y + 50;
        // — Tier-coloured radial glow disc (primary — works reliably on iOS)
        const glowOpacity = game.glowIntensity * 0.03; // 8→0.24, 20→0.60 (2x)
        if (glowOpacity > 0.01) {
          const hex = tier.color;
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          const glowDisc = ctx.createRadialGradient(cx, cy, 15, cx, cy, 85);
          glowDisc.addColorStop(0, `rgba(${r},${g},${b},0.8)`);
          glowDisc.addColorStop(0.4, `rgba(${r},${g},${b},0.35)`);
          glowDisc.addColorStop(1, `rgba(${r},${g},${b},0)`);
          ctx.save();
          ctx.globalAlpha = glowOpacity;
          ctx.fillStyle = glowDisc;
          ctx.beginPath();
          ctx.arc(cx, cy, 85, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        // — Rocket glow (warm orange halo at nozzle, illuminates from below)
        const glowX = player.x + 3;
        const glowY = player.y + 76;
        const glowGrad = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, 60);
        glowGrad.addColorStop(0, 'rgba(255, 136, 0, 0.30)');
        glowGrad.addColorStop(0.4, 'rgba(255, 80, 0, 0.12)');
        glowGrad.addColorStop(1, 'rgba(255, 80, 0, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(glowX, glowY, 60, 0, Math.PI * 2);
        ctx.fill();
        // — Drop shadow (faint dark silhouette behind player)
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(tiltAngle);
        ctx.globalAlpha = 0.18;
        ctx.drawImage(playerImage, -58, -58, 120, 120);
        ctx.restore();
        // — Player outline (tier-coloured shadowBlur glow, pulsing on level up)
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(tiltAngle);
        ctx.shadowColor = tier.color;
        ctx.shadowBlur = game.glowIntensity;
        ctx.drawImage(playerImage, -60, -60, 120, 120);
        ctx.restore();
        // — Main player sprite (on top, no glow)
        ctx.save();
        // Rotate around visual center (120x120 sprite centered on 100x100 collision)
        ctx.translate(cx, cy);
        ctx.rotate(tiltAngle);
        ctx.drawImage(playerImage, -60, -60, 120, 120);
        ctx.restore();
      } else {
        // Fallback: rotate collision rectangle around its center
        ctx.save();
        const cx2 = player.x + player.width / 2;
        const cy2 = player.y + player.height / 2;
        ctx.translate(cx2, cy2);
        ctx.rotate(tiltAngle);
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
        ctx.restore();
      }

      // --- HUD: Tier name (left) + Score (right) + Full-width bar ---
      const hudPad = 16;
      const hudRow1Y = 30;
      const scoreText = '1 NMR ≈ $' + game.score;

      // Tier name - left aligned (tier-colored, bold, with accessibility symbol prefix)
      ctx.font = 'bold 20px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000000';
      ctx.strokeText(TIER_SYMBOLS[tier.index] + ' ' + tier.name.toUpperCase(), hudPad, hudRow1Y);
      ctx.fillStyle = tier.color;
      ctx.fillText(TIER_SYMBOLS[tier.index] + ' ' + tier.name.toUpperCase(), hudPad, hudRow1Y);

      // Score - right aligned
      ctx.font = 'bold 20px Courier New, monospace';
      ctx.textAlign = 'right';
      ctx.lineWidth = 2;
      const scoreX = LOGICAL_WIDTH - hudPad;
      const scoreY = hudRow1Y;

      // Rainbow glow on score pop
      if (game.scorePopTimer > 0) {
        const progress = game.scorePopTimer / 500;
        const blur = Math.round(40 * progress);
        const hue = game.rainbowHue;
        ctx.save();
        ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
        ctx.shadowBlur = blur;
        ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
        ctx.fillText(scoreText, scoreX, scoreY);
        ctx.shadowBlur = 0;
        ctx.strokeText(scoreText, scoreX, scoreY);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(scoreText, scoreX, scoreY);
        ctx.restore();
      } else {
        ctx.save();
        ctx.strokeText(scoreText, scoreX, scoreY);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(scoreText, scoreX, scoreY);
        ctx.restore();
      }

      // --- Full-width progress bar ---
      const barY = 48;
      const barH = 6;
      const segGap = 2;
      const availableW = LOGICAL_WIDTH - hudPad * 2;
      const segW = (availableW - (TIER_INTERVAL - 1) * segGap) / TIER_INTERVAL;
      for (let i = 0; i < TIER_INTERVAL; i++) {
        const segX = hudPad + i * (segW + segGap);
        const filled = i < (game.score % TIER_INTERVAL);
        ctx.fillStyle = filled ? tier.color : 'rgba(255, 255, 255, 0.12)';
        ctx.fillRect(segX, barY, segW, barH);
      }
    }

    function drawGameOver() {
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Score panel
      const panelW = 320;
      const panelH = 230;
      const panelX = (LOGICAL_WIDTH - panelW) / 2;
      const panelY = (LOGICAL_HEIGHT - panelH) / 2 - 30;

      // Get tier at time of death
      const deathTier = getTier();

      // Panel background
      ctx.fillStyle = 'rgba(10, 14, 23, 0.9)';
      ctx.strokeStyle = deathTier.color;
      ctx.lineWidth = 2;
      ctx.fillRect(panelX, panelY, panelW, panelH);
      ctx.strokeRect(panelX, panelY, panelW, panelH);

      // Game Over text
      ctx.font = 'bold 36px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000000';
      ctx.strokeText('GAME OVER', LOGICAL_WIDTH / 2, panelY + 57);
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('GAME OVER', LOGICAL_WIDTH / 2, panelY + 57);

      // TIER (matches HUD left style — bold 20px, tier colour + black outline, with symbol)
      ctx.font = 'bold 20px Courier New, monospace';
      ctx.lineWidth = 2;
      ctx.strokeText('TIER: ' + TIER_SYMBOLS[deathTier.index] + ' ' + deathTier.name.toUpperCase(), LOGICAL_WIDTH / 2, panelY + 112);
      ctx.fillStyle = deathTier.color;
      ctx.fillText('TIER: ' + TIER_SYMBOLS[deathTier.index] + ' ' + deathTier.name.toUpperCase(), LOGICAL_WIDTH / 2, panelY + 112);

      // Score (tight 10px gap below TIER)
      ctx.font = 'bold 24px Courier New, monospace';
      ctx.lineWidth = 3;
      ctx.strokeText('1 NMR ≈ $' + game.score, LOGICAL_WIDTH / 2, panelY + 144);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('1 NMR ≈ $' + game.score, LOGICAL_WIDTH / 2, panelY + 144);

      // Restart prompt
      ctx.font = '16px Courier New, monospace';
      ctx.lineWidth = 2;
      ctx.strokeText('Press SPACE or Tap to Restart', LOGICAL_WIDTH / 2, panelY + 193);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.fillText('Press SPACE or Tap to Restart', LOGICAL_WIDTH / 2, panelY + 193);
    }

    // --- Game Loop ---
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - game.lastTime) / DT_TO_MS, 3); // cap at 3 frames
      game.lastTime = timestamp;

      update(dt);
      draw();

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    // --- Landscape orientation overlay for small screens ---
    const rotateOverlay = document.getElementById('rotate-overlay');
    const orientationMql = window.matchMedia('(orientation: landscape)');
    function checkOrientation() {
      rotateOverlay.style.display = (orientationMql.matches && window.innerWidth < 768) ? 'flex' : 'none';
    }
    checkOrientation();
    orientationMql.addEventListener('change', checkOrientation);
  </script>
</body>
</html>
