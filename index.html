<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerocket</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e17;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      margin: auto;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    // --- Canvas setup ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // Logical game resolution (coordinates stay 400×600)
    const LOGICAL_WIDTH = 400;
    const LOGICAL_HEIGHT = 600;

    canvas.width = LOGICAL_WIDTH;
    canvas.height = LOGICAL_HEIGHT;

    // Auto-resize: fill viewport height, maintain 2:3, DPR-aware
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      // Calculate display size — full viewport height, 2:3 width
      let displayHeight = window.innerHeight;
      let displayWidth = Math.round(displayHeight * 2 / 3);

      // Clamp width to viewport (portrait / ultrawide safety)
      if (displayWidth > window.innerWidth) {
        displayWidth = window.innerWidth;
        displayHeight = Math.round(displayWidth * 3 / 2);
      }

      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayHeight + 'px';

      // Scale pixel buffer for Retina sharpness
      canvas.width = Math.round(LOGICAL_WIDTH * dpr);
      canvas.height = Math.round(LOGICAL_HEIGHT * dpr);

      // Scale context so all game code still works in 400×600 coords
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // Resize on load and on window change
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- Sound Effects (Web Audio API chiptune) ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        try { audioCtx = new AudioCtx(); }
        catch (e) { console.warn('AudioContext creation failed:', e); return; }
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // Helper: play a single oscillator tone
    function playTone(freq, type, duration, slide, vol) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + duration);
      gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    // Helper: white noise burst
    function playNoise(duration, vol) {
      if (!audioCtx) return;
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start();
    }

    // --- Sound FX (A2 — Pepe Meme-Aware Chiptune) ---

    // 🐸 D1 — Boing: descending spring then bounce-back
    function sfxRibbit() {
      initAudio();
      // Descending 600→100Hz (spring stretch)
      playTone(600, 'sine', 0.06, 100, 0.06);
      // Bounce back 100→400Hz (spring recoil)
      setTimeout(() => playTone(100, 'sine', 0.06, 400, 0.04), 55);
    }

    // 📈 G2 — Triple Blip: three rising square beeps
    function sfxDing() {
      initAudio();
      playTone(400, 'square', 0.05, null, 0.12);
      setTimeout(() => playTone(600, 'square', 0.05, null, 0.12), 50);
      setTimeout(() => playTone(800, 'square', 0.06, null, 0.14), 100);
    }

    // 💥 Sad trombone death: descending sawtooth
    function sfxDeath() {
      initAudio();
      // Descending from 600Hz → 100Hz over 500ms
      playTone(600, 'sawtooth', 0.5, 100, 0.12);
      // Low rumble on top
      setTimeout(() => playTone(80, 'square', 0.3, 40, 0.06), 50);
    }

    // 🎮 Start arpeggio: C-E-G chiptune style
    function sfxStart() {
      initAudio();
      playTone(523, 'square', 0.1, null, 0.10);  // C5
      setTimeout(() => playTone(659, 'square', 0.1, null, 0.10), 80);  // E5
      setTimeout(() => playTone(784, 'square', 0.15, null, 0.10), 160); // G5
    }

    // 🚀 Level up: rising octave sweep
    function sfxLevelUp() {
      initAudio();
      playTone(440, 'triangle', 0.15, 880, 0.12);
      setTimeout(() => playTone(880, 'triangle', 0.2, 1320, 0.10), 120);
    }

    // --- Constants ---
    const GRAVITY = 0.5;
    const JUMP_VELOCITY = -8;
    const GAP_SIZE_INITIAL_MIN = 250;
    const GAP_SIZE_INITIAL_MAX = 270;
    const GAP_SIZE_FLOOR_MIN = 220;
    const GAP_SIZE_FLOOR_MAX = 240;
    const GAP_SCALE_INTERVAL = 5;   // shrink every N obstacles
    const GAP_SCALE_STEP = 2;       // px shrink per interval
    function getGapSize() {
      const steps = Math.floor(game.score / GAP_SCALE_INTERVAL);
      const min = Math.max(GAP_SIZE_FLOOR_MIN, GAP_SIZE_INITIAL_MIN - steps * GAP_SCALE_STEP);
      const max = Math.max(GAP_SIZE_FLOOR_MAX, GAP_SIZE_INITIAL_MAX - steps * GAP_SCALE_STEP);
      return min + Math.floor(Math.random() * (max - min + 1));
    }  // Vertical gap scales down with score
    const TIER_INTERVAL = 10;        // obstacles per tier
    const TIER_NAMES = ['Apprentice', 'Contributor', 'Researcher', 'Expert', 'Master', 'Grandmaster'];
    const TIER_COLORS = ['#737373', '#4DB8FF', '#00E5FF', '#44E76B', '#B388FF', '#FFE100'];
    const TIER_SPEEDS = [3.6, 3.8, 4.0, 4.2, 4.4, 4.6];
    function getTier() {
      const maxIndex = TIER_NAMES.length - 1;
      const rawIndex = Math.floor(game.score / TIER_INTERVAL);
      const index = Math.min(maxIndex, rawIndex);
      const rounds = rawIndex > maxIndex ? rawIndex - maxIndex + 1 : 1;
      const multiplier = rounds > 1 ? ' x' + rounds : '';
      const baseSpeed = rawIndex < TIER_SPEEDS.length ? TIER_SPEEDS[rawIndex] : TIER_SPEEDS[maxIndex] + (rawIndex - maxIndex) * 0.2;
      return {
        index,
        name: TIER_NAMES[index] + multiplier,
        color: TIER_COLORS[index],
        speed: Math.min(baseSpeed, 7.0),
      };
    }
    function getSpeed() { return getTier().speed; }
    const SPAWN_INTERVAL_MIN = 90;
    const SPAWN_INTERVAL_MAX = 120;
    const PLAYER_X = 80;
    const PLAYER_WIDTH = 100;
    const PLAYER_HEIGHT = 100;

    // --- Game state ---
    const State = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };

    const game = {
      state: State.MENU,
      score: 0,
      comboCount: 0,
      obstacles: [],
      spawnTimer: 0,
      spawnInterval: SPAWN_INTERVAL_MIN,
      lastTime: 0,
      deathTimer: 0,
      scorePopTimer: 0,
      rainbowHue: 0,
      bgOffset: 0,
      particles: [],
      rings: [],
      screenFlash: 0,
      glowIntensity: 0,
    };

    // --- Player ---
    const player = {
      x: PLAYER_X,
      y: 0,
      width: PLAYER_WIDTH,
      height: PLAYER_HEIGHT,
      velocityY: 0,
      tiltAngle: 0,
    };

    function resetGame() {
      player.y = LOGICAL_HEIGHT / 2;
      player.velocityY = 0;
      game.score = 0;
      game.comboCount = 0;
      game.obstacles = [];
      game.spawnTimer = 0;
      game.spawnInterval = SPAWN_INTERVAL_MIN;
      game.particles = [];
      game.scorePopTimer = 0;
      game.deathTimer = 0;
      game.bgOffset = 0;
      game.rainbowHue = 0;

      game.rings = [];
      game.screenFlash = 0;
      game.glowIntensity = 0;

      game.lastGapY = null;
      player.tiltAngle = 0;
    }
    resetGame();

    // --- Obstacle asset placeholder ---
    // TODO: assign image URLs and wire into drawGame() to replace shape rendering
    const OBSTACLE_IMAGE_SRC = null;
    // --- Player asset ---
    // Image is loaded below and wired into drawGame()
    const PLAYER_IMAGE_SRC = 'assets/player.png';
    const playerImage = new Image();
    let playerImageLoaded = false;
    playerImage.onerror = () => console.warn('Failed to load player image:', PLAYER_IMAGE_SRC);
    playerImage.onload = () => { playerImageLoaded = true; };
    playerImage.src = PLAYER_IMAGE_SRC;
    // --- Background asset ---
    const BACKGROUND_IMAGE_SRC = 'assets/background.jpg';
    const bgImage = new Image();
    let bgImageLoaded = false;
    let bgNaturalW = 1200;
    let bgNaturalH = 600;
    bgImage.onload = () => {
      bgImageLoaded = true;
      bgNaturalW = bgImage.naturalWidth;
      bgNaturalH = bgImage.naturalHeight;
    };
    bgImage.onerror = () => console.warn('Failed to load background image:', BACKGROUND_IMAGE_SRC);
    bgImage.src = BACKGROUND_IMAGE_SRC;

    // --- Input ---
    function handleJump() {
      if (game.state === State.MENU) {
        sfxStart();
        game.state = State.PLAYING;
        resetGame();
        player.velocityY = JUMP_VELOCITY;
      } else if (game.state === State.PLAYING) {
        sfxRibbit();
        player.velocityY = JUMP_VELOCITY;
      } else if (game.state === State.GAME_OVER) {
        game.state = State.MENU;
        game.deathTimer = 0;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
        e.preventDefault();
        handleJump();
      }
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleJump();
    }, { passive: false });

    canvas.addEventListener('click', (e) => {
      e.preventDefault();
      handleJump();
    });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    function checkCollision(a, b) {
      const padding = 8; // fairness padding — makes game easier
      return a.x < b.x + b.width - padding &&
             a.x + a.width > b.x + padding &&
             a.y < b.y + b.height - padding &&
             a.y + a.height > b.y + padding;
    }

    function spawnObstacle() {
      const MIN_BAR_HEIGHT = Math.round(LOGICAL_HEIGHT * 0.13); // 80px min — keeps HUD area clear
      const gapSize = getGapSize();
      const minGapY = MIN_BAR_HEIGHT + gapSize / 2;
      const maxGapY = LOGICAL_HEIGHT - MIN_BAR_HEIGHT - gapSize / 2;
      const MIN_GAP_DISTANCE = 100; // minimum vertical distance between consecutive gaps
      let gapY = minGapY + Math.random() * (maxGapY - minGapY);
      // Enforce minimum vertical distance from previous gap
      if (game.lastGapY !== null) {
        const tooClose = Math.abs(gapY - game.lastGapY) < MIN_GAP_DISTANCE;
        if (tooClose) {
          // Push gapY away from lastGapY by exactly MIN_GAP_DISTANCE
          if (gapY < game.lastGapY) {
            gapY = game.lastGapY - MIN_GAP_DISTANCE;
          } else {
            gapY = game.lastGapY + MIN_GAP_DISTANCE;
          }
          // Clamp to valid range
          gapY = Math.max(minGapY, Math.min(maxGapY, gapY));
        }
      }
      game.lastGapY = gapY;
      game.obstacles.push({
        x: LOGICAL_WIDTH,
        gapY: gapY,
        gapSize: gapSize,
        width: 60,
        scored: false,
      });
    }

    // --- Update ---
    function update(dt) {
      if (game.state === State.PLAYING) {
        // Player physics
        player.velocityY += GRAVITY * dt;
        player.y += player.velocityY * dt;

        // Ceiling clamp
        if (player.y < 0) player.y = 0;

        // Ground check — clamp y before game-over to prevent clipping
        if (player.y + player.height > LOGICAL_HEIGHT) {
          player.y = LOGICAL_HEIGHT - player.height;
          sfxDeath();
          game.state = State.GAME_OVER;
        }

        // Parallax background scroll (30% of obstacle speed)
        game.bgOffset += getSpeed() * 0.3 * dt;

        // Spawn obstacles (dt-accumulated timer)
        game.spawnTimer += dt;
        if (game.spawnTimer >= game.spawnInterval) {
          spawnObstacle();
          const delay = SPAWN_INTERVAL_MIN + Math.floor(Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN));
          game.spawnInterval = delay;
          game.spawnTimer = 0;
        }

        // Move obstacles
        for (let i = game.obstacles.length - 1; i >= 0; i--) {
          const obs = game.obstacles[i];
          obs.x -= getSpeed() * dt;

          // Scoring
          if (!obs.scored && obs.x + obs.width < player.x) {
            obs.scored = true;
            game.score++;
            game.comboCount++;
            game.scorePopTimer = 500;
            if (game.score % TIER_INTERVAL === 0) {
              // Tier promotion — dual shockwave rings + screen flash + fanfare
              const tierIdx = Math.min(TIER_NAMES.length - 1, Math.floor(game.score / TIER_INTERVAL));
              const cx = player.x + PLAYER_WIDTH / 2;
              const cy = player.y + PLAYER_HEIGHT / 2;
              // Ring 1 — immediate, wide, thick
              game.rings.push({
                x: cx, y: cy,
                radius: 0,
                maxRadius: 220,
                timer: 35,
                duration: 35,
                color: TIER_COLORS[tierIdx],
                startWidth: 10,
                endWidth: 4,
                startAlpha: 1.0,
                endAlpha: 0.0,
              });
              // Ring 2 — offset delay (timer < duration = starts mid-expansion)
              game.rings.push({
                x: cx, y: cy,
                radius: 0,
                maxRadius: 180,
                timer: 25,
                duration: 35,
                color: TIER_COLORS[tierIdx],
                startWidth: 8,
                endWidth: 3,
                startAlpha: 0.8,
                endAlpha: 0.0,
              });
              game.screenFlash = 8;
              game.glowIntensity = 20;
              sfxLevelUp();
              game.comboCount = 0;
            }
            // Regular score sound
            sfxDing();
          }

          // Collision detection
          const topBar = { x: obs.x, y: 0, width: obs.width, height: obs.gapY - obs.gapSize / 2 };
          const bottomBar = { x: obs.x, y: obs.gapY + obs.gapSize / 2, width: obs.width, height: LOGICAL_HEIGHT - (obs.gapY + obs.gapSize / 2) };

          if (checkCollision(player, topBar) || checkCollision(player, bottomBar)) {
            sfxDeath();
            game.state = State.GAME_OVER;
          }

          // Remove off-screen
          if (obs.x + obs.width < 0) {
            game.obstacles.splice(i, 1);
          }
        }

        // --- Exhaust smoke particles ---
        // Spawn particles behind the rocket nozzle (more during boost)
        const particleTier = Math.floor(game.score / TIER_INTERVAL);
        const spawnCount = Math.min(2 + Math.floor(particleTier / 2), 4);
        const minSize = 5;
        const maxSize = 8;
        const warmth = Math.min(1, particleTier / 6);
        for (let i = 0; i < spawnCount; i++) {
          game.particles.push({
            x: player.x - 1 + Math.random() * 8,
            y: player.y + 71 + Math.random() * 10,
            life: 1.0,
            size: minSize + Math.random() * (maxSize - minSize),
            vx: -(4 + Math.random() * 4),
            vy: 1.5 + Math.random() * 2.5,
            warmth: warmth,
          });
        }
        // Cap at 200 particles
        if (game.particles.length > 200) {
          game.particles.splice(0, game.particles.length - 200);
        }
        // Update existing particles
        for (let i = game.particles.length - 1; i >= 0; i--) {
          const p = game.particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          // Upward buoyancy: hot gas rises — stronger as smoke ages
          p.vy -= 0.02 * dt;
          // Turbulence jitter
          p.vx += (Math.random() - 0.5) * 0.2;
          p.vy += (Math.random() - 0.5) * 0.2;
          p.life -= 0.02 * dt;
          // Size expands as smoke ages and spreads
          if (p.life < 0.75) p.size += 0.03 * dt;
          if (p.life < 0.5)  p.size += 0.04 * dt;
          if (p.life < 0.2)  p.size += 0.05 * dt;
          if (p.size > 16)   p.size = 16;
          if (p.life <= 0) {
            game.particles.splice(i, 1);
          }
        }

        // Smooth tilt: lerp toward velocity-based target
        const targetTilt = player.velocityY * 0.025;
        player.tiltAngle += (targetTilt - player.tiltAngle) * 0.15;
      }

      // Track death timer for shake/flash effect
      if (game.state === State.GAME_OVER) {
        game.deathTimer += dt * 16.667;
      }

      // Decrement score pop timer
      if (game.scorePopTimer > 0) {
        game.scorePopTimer -= dt * 16.667;
        if (game.scorePopTimer < 0) game.scorePopTimer = 0;
      }

      // Update shockwave rings
      for (let i = game.rings.length - 1; i >= 0; i--) {
        const r = game.rings[i];
        r.timer -= dt;
        r.radius = r.maxRadius * (1 - r.timer / r.duration);
        if (r.timer <= 0) {
          game.rings.splice(i, 1);
        }
      }

      // Screen flash fade
      if (game.screenFlash > 0) {
        game.screenFlash -= dt;
        if (game.screenFlash < 0) game.screenFlash = 0;
      }

      // Glow intensity fade (spikes on tier promotion, decays to steady 8)
      if (game.glowIntensity > 8) {
        game.glowIntensity -= 0.6 * dt;
        if (game.glowIntensity < 8) game.glowIntensity = 8;
      }

      // Cycle rainbow hue for score-pop glow
      game.rainbowHue = (game.rainbowHue + 2) % 360;
    }

    // --- Draw ---
    function draw() {
      // Shake effect on death (±1.5px for 200ms — gentle arcade feedback)
      const shaking = game.deathTimer > 0 && game.deathTimer < 200;
      if (shaking) {
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3);
      }

      // Background fill (fallback if bg image hasn't loaded)
      ctx.fillStyle = '#0a0e17';
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Parallax background image (scrolls at 30% of obstacle speed)
      if (bgImageLoaded) {
        const bgW = bgNaturalW * (LOGICAL_HEIGHT / bgNaturalH);
        const bgH = LOGICAL_HEIGHT;
        const bgX = -(game.bgOffset % bgW);
        ctx.drawImage(bgImage, 0, 0, bgNaturalW, bgNaturalH, Math.round(bgX), 0, Math.round(bgW), bgH);
        ctx.drawImage(bgImage, 0, 0, bgNaturalW, bgNaturalH, Math.round(bgX + bgW) - 1, 0, Math.round(bgW) + 2, bgH);
      }

      if (game.state === State.MENU) {
        drawMenu();
      } else if (game.state === State.PLAYING || game.state === State.GAME_OVER) {
        drawGame();
      }

      if (game.state === State.GAME_OVER) {
        drawGameOver();
      }

      // End shake transform
      if (shaking) {
        ctx.restore();
      }

      // Screen flash (brief tint on level up)
      if (game.screenFlash > 0) {
        ctx.fillStyle = `rgba(255, 200, 100, ${0.12 * (game.screenFlash / 8)})`;
        ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
      }

      // CRT scanline overlay (always on top, unaffected by shake)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      for (let y = 0; y < LOGICAL_HEIGHT; y += 4) {
        ctx.fillRect(0, y, LOGICAL_WIDTH, 2);
      }
    }

    let bestScore = 0;

    function drawMenu() {
      if (game.score > bestScore) bestScore = game.score;
      ctx.textAlign = 'center';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000000';

      // Player sprite above title
      if (playerImageLoaded) {
        const spriteSize = 120;
        const spriteY = LOGICAL_HEIGHT / 2 - 150;
        ctx.drawImage(playerImage, LOGICAL_WIDTH / 2 - spriteSize / 2, spriteY, spriteSize, spriteSize);
      }

      if (bestScore > 0) {
        ctx.font = 'bold 18px Courier New, monospace';
        ctx.strokeText('Best Score: 1 NMR ≈ $' + bestScore, LOGICAL_WIDTH / 2, 30);
        ctx.fillStyle = '#00d4aa';
        ctx.fillText('Best Score: 1 NMR ≈ $' + bestScore, LOGICAL_WIDTH / 2, 30);
      }
      ctx.font = 'bold 48px Courier New, monospace';
      ctx.strokeText('NUMEROCKET', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 30);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('NUMEROCKET', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 30);
      // Subtitle — two rows, 18px white + black outline (same as prompt)
      ctx.font = '18px Courier New, monospace';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000000';
      ctx.strokeText('  Ride the market and  ', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 2);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('  Ride the market and  ', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 2);
      ctx.strokeText('  send NMR to the moon  ', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 20);
      ctx.fillText('  send NMR to the moon  ', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 20);
      ctx.font = '18px Courier New, monospace';
      ctx.lineWidth = 3;
      ctx.strokeText('Press SPACE or Tap to Start', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 240);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Press SPACE or Tap to Start', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 240);
      // Version footer
      ctx.font = '14px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000000';
      ctx.strokeText('Prototype v0.6', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT - 15);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.60)';
      ctx.fillText('Prototype v0.6', LOGICAL_WIDTH / 2, LOGICAL_HEIGHT - 15);
    }

    function drawGame() {
      // --- Obstacles (candlestick-chart style) ---
      for (const obs of game.obstacles) {
        const topHeight = obs.gapY - obs.gapSize / 2;
        const bottomY = obs.gapY + obs.gapSize / 2;
        const bottomHeight = LOGICAL_HEIGHT - bottomY;

        const wickColour = '#000000';
        const wickLen = 10;
        const borderW = 3;

        // --- Top bar ---
        const topBodyH = topHeight - wickLen;
        // Vertical gradient: dark green top → light green bottom (lit toward gap)
        const topGrad = ctx.createLinearGradient(0, 0, 0, topBodyH);
        topGrad.addColorStop(0, '#009624');
        topGrad.addColorStop(1, '#00e676');
        // Body fill + black border
        ctx.fillStyle = topGrad;
        ctx.strokeStyle = wickColour;
        ctx.lineWidth = borderW;
        ctx.fillRect(obs.x, 0, obs.width, topBodyH);
        ctx.strokeRect(obs.x, 0, obs.width, topBodyH);
        // Wick extending downward (into gap)
        ctx.beginPath();
        ctx.moveTo(obs.x + obs.width / 2, topBodyH);
        ctx.lineTo(obs.x + obs.width / 2, topHeight);
        ctx.stroke();

        // --- Bottom bar ---
        const bottomBodyY = bottomY + wickLen;
        const bottomBodyH = bottomHeight - wickLen;
        // Vertical gradient: light green top → dark green bottom
        const bottomGrad = ctx.createLinearGradient(0, bottomBodyY, 0, bottomBodyY + bottomBodyH);
        bottomGrad.addColorStop(0, '#00e676');
        bottomGrad.addColorStop(1, '#009624');
        // Body fill + black border
        ctx.fillStyle = bottomGrad;
        ctx.fillRect(obs.x, bottomBodyY, obs.width, bottomBodyH);
        ctx.strokeRect(obs.x, bottomBodyY, obs.width, bottomBodyH);
        // Wick extending upward (into gap)
        ctx.beginPath();
        ctx.moveTo(obs.x + obs.width / 2, bottomY);
        ctx.lineTo(obs.x + obs.width / 2, bottomBodyY);
        ctx.stroke();
      }

      // --- Shockwave rings (tier-coloured on level up) ---
      for (const r of game.rings) {
        const progress = r.timer / r.duration;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        // Parse hex color to RGBA with fade
        const hex = r.color || '#FFE100';
        const rCol = parseInt(hex.slice(1, 3), 16);
        const gCol = parseInt(hex.slice(3, 5), 16);
        const bCol = parseInt(hex.slice(5, 7), 16);
        // Per-ring alpha (default: fades in as it expands — old behaviour)
        const startA = r.startAlpha !== undefined ? r.startAlpha : 0.0;
        const endA = r.endAlpha !== undefined ? r.endAlpha : 1.0;
        const alpha = startA * progress + endA * (1 - progress);
        ctx.strokeStyle = `rgba(${rCol}, ${gCol}, ${bCol}, ${alpha})`;
        // Per-ring line width (default: 3→8 — thin start, thick end)
        const startW = r.startWidth !== undefined ? r.startWidth : 3;
        const endW = r.endWidth !== undefined ? r.endWidth : 8;
        ctx.lineWidth = startW * progress + endW * (1 - progress);
        ctx.stroke();
      }

      // (Score drawn in HUD strip below)

      // --- Exhaust smoke particles (radial-gradient, behind player) ---
      for (const p of game.particles) {
        // Colour/lifecycle curve: muzzle flash fire blast → dark gray → light gray → transparent
        let r, g, b, alpha, drawR;
        if (p.life > 0.85) {
          // life 1.0→0.85: lighter warm orange core (#FF8800), alpha 0.95
          r = 255; g = Math.round(136 + 84 * p.warmth); b = 0;
          alpha = 0.95 + 0.05 * p.warmth;
          drawR = p.size * (1.0 + 0.3 * p.warmth);
        } else if (p.life > 0.75) {
          // life 0.85→0.75: transition to deep warm orange (#FF5500), alpha 0.9
          const t = 1 - (p.life - 0.75) / 0.10;
          g = Math.round(136 + (85 - 136) * t);
          g = Math.round(g + (Math.min(255, Math.round(g * 1.6)) - g) * p.warmth);
          r = 255; b = 0;
          alpha = 0.9 + 0.1 * p.warmth;
          drawR = p.size * (1.0 + 0.3 * p.warmth);
        } else if (p.life > 0.5) {
          // life 0.75→0.5: dark gray smoke (#222→#444), medium, alpha 0.6
          const t = 1 - (p.life - 0.5) / 0.25;
          let gray = Math.round(0x22 + (0x44 - 0x22) * t);
          gray = Math.round(gray + (gray * 1.5 - gray) * p.warmth);
          r = gray; g = gray; b = gray;
          alpha = 0.6 + 0.2 * p.warmth;
          drawR = p.size * (1.0 + 0.2 * p.warmth);
        } else if (p.life > 0.2) {
          // life 0.5→0.2: light gray smoke (#777→#aaa), large, alpha 0.3
          const t = 1 - (p.life - 0.2) / 0.3;
          const gray = Math.round(0x77 + (0xaa - 0x77) * t);
          r = gray; g = gray; b = gray;
          alpha = 0.3;
          drawR = p.size;
        } else {
          // life 0.2→0.0: fading to transparent, extra large
          r = 170; g = 170; b = 170;
          alpha = (p.life / 0.2) * 0.3;
          drawR = p.size;
        }

        ctx.globalAlpha = Math.min(alpha, 1);
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, drawR);
        grad.addColorStop(0, `rgb(${r},${g},${b})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, drawR, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;

      // Get current tier info (used for glow colour & progress bar)
      const tier = getTier();

      // Player — rocket glow + drop shadow for visibility on dark backgrounds
      const tiltAngle = player.tiltAngle;
      if (playerImageLoaded) {
        const cx = player.x + 50;
        const cy = player.y + 50;
        // — Tier-coloured radial glow disc (primary — works reliably on iOS)
        const glowOpacity = game.glowIntensity * 0.03; // 8→0.24, 20→0.60 (2x)
        if (glowOpacity > 0.01) {
          const hex = tier.color;
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          const glowDisc = ctx.createRadialGradient(cx, cy, 15, cx, cy, 85);
          glowDisc.addColorStop(0, `rgba(${r},${g},${b},0.8)`);
          glowDisc.addColorStop(0.4, `rgba(${r},${g},${b},0.35)`);
          glowDisc.addColorStop(1, `rgba(${r},${g},${b},0)`);
          ctx.save();
          ctx.globalAlpha = glowOpacity;
          ctx.fillStyle = glowDisc;
          ctx.beginPath();
          ctx.arc(cx, cy, 85, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        // — Rocket glow (warm orange halo at nozzle, illuminates from below)
        const glowX = player.x + 3;
        const glowY = player.y + 76;
        const glowGrad = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, 60);
        glowGrad.addColorStop(0, 'rgba(255, 136, 0, 0.30)');
        glowGrad.addColorStop(0.4, 'rgba(255, 80, 0, 0.12)');
        glowGrad.addColorStop(1, 'rgba(255, 80, 0, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(glowX, glowY, 60, 0, Math.PI * 2);
        ctx.fill();
        // — Drop shadow (faint dark silhouette behind player)
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(tiltAngle);
        ctx.globalAlpha = 0.18;
        ctx.drawImage(playerImage, -58, -58, 120, 120);
        ctx.restore();
        // — Player outline (tier-coloured shadowBlur glow, pulsing on level up)
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(tiltAngle);
        ctx.shadowColor = tier.color;
        ctx.shadowBlur = game.glowIntensity;
        ctx.drawImage(playerImage, -60, -60, 120, 120);
        ctx.restore();
        // — Main player sprite (on top, no glow)
        ctx.save();
        // Rotate around visual center (120x120 sprite centered on 100x100 collision)
        ctx.translate(cx, cy);
        ctx.rotate(tiltAngle);
        ctx.drawImage(playerImage, -60, -60, 120, 120);
        ctx.restore();
      } else {
        // Fallback: rotate collision rectangle around its center
        ctx.save();
        const cx2 = player.x + player.width / 2;
        const cy2 = player.y + player.height / 2;
        ctx.translate(cx2, cy2);
        ctx.rotate(tiltAngle);
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
        ctx.restore();
      }

      // --- HUD: Tier name (left) + Score (right) + Full-width bar ---
      const hudPad = 16;
      const hudRow1Y = 30;
      const scoreText = '1 NMR ≈ $' + game.score;

      // Tier name - left aligned (tier-colored, bold)
      ctx.font = 'bold 20px Courier New, monospace';
      ctx.textAlign = 'left';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000000';
      ctx.strokeText(tier.name.toUpperCase(), hudPad, hudRow1Y);
      ctx.fillStyle = tier.color;
      ctx.fillText(tier.name.toUpperCase(), hudPad, hudRow1Y);

      // Score - right aligned
      ctx.font = 'bold 20px Courier New, monospace';
      ctx.textAlign = 'right';
      ctx.lineWidth = 2;
      const scoreX = LOGICAL_WIDTH - hudPad;
      const scoreY = hudRow1Y;

      // Rainbow glow on score pop
      if (game.scorePopTimer > 0) {
        const progress = game.scorePopTimer / 500;
        const blur = Math.round(40 * progress);
        const hue = game.rainbowHue;
        ctx.save();
        ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
        ctx.shadowBlur = blur;
        ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
        ctx.fillText(scoreText, scoreX, scoreY);
        ctx.shadowBlur = 0;
        ctx.strokeText(scoreText, scoreX, scoreY);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(scoreText, scoreX, scoreY);
        ctx.restore();
      } else {
        ctx.save();
        ctx.strokeText(scoreText, scoreX, scoreY);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(scoreText, scoreX, scoreY);
        ctx.restore();
      }

      // --- Full-width progress bar ---
      const barY = 48;
      const barH = 6;
      const segGap = 2;
      const availableW = LOGICAL_WIDTH - hudPad * 2;
      const segW = (availableW - (TIER_INTERVAL - 1) * segGap) / TIER_INTERVAL;
      for (let i = 0; i < TIER_INTERVAL; i++) {
        const segX = hudPad + i * (segW + segGap);
        const filled = i < (game.score % TIER_INTERVAL);
        ctx.fillStyle = filled ? tier.color : 'rgba(255, 255, 255, 0.12)';
        ctx.fillRect(segX, barY, segW, barH);
      }
    }

    function drawGameOver() {
      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Score panel
      const panelW = 320;
      const panelH = 230;
      const panelX = (LOGICAL_WIDTH - panelW) / 2;
      const panelY = (LOGICAL_HEIGHT - panelH) / 2 - 30;

      // Get tier at time of death
      const deathTier = getTier();

      // Panel background
      ctx.fillStyle = 'rgba(10, 14, 23, 0.9)';
      ctx.strokeStyle = deathTier.color;
      ctx.lineWidth = 2;
      ctx.fillRect(panelX, panelY, panelW, panelH);
      ctx.strokeRect(panelX, panelY, panelW, panelH);

      // Game Over text
      ctx.font = 'bold 36px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000000';
      ctx.strokeText('GAME OVER', LOGICAL_WIDTH / 2, panelY + 57);
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('GAME OVER', LOGICAL_WIDTH / 2, panelY + 57);

      // TIER (matches HUD left style — bold 20px, tier colour + black outline)
      ctx.font = 'bold 20px Courier New, monospace';
      ctx.lineWidth = 2;
      ctx.strokeText('TIER: ' + deathTier.name.toUpperCase(), LOGICAL_WIDTH / 2, panelY + 112);
      ctx.fillStyle = deathTier.color;
      ctx.fillText('TIER: ' + deathTier.name.toUpperCase(), LOGICAL_WIDTH / 2, panelY + 112);

      // Score (tight 10px gap below TIER)
      ctx.font = 'bold 24px Courier New, monospace';
      ctx.lineWidth = 3;
      ctx.strokeText('1 NMR ≈ $' + game.score, LOGICAL_WIDTH / 2, panelY + 144);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('1 NMR ≈ $' + game.score, LOGICAL_WIDTH / 2, panelY + 144);

      // Restart prompt
      ctx.font = '16px Courier New, monospace';
      ctx.lineWidth = 2;
      ctx.strokeText('Press SPACE or Tap to Restart', LOGICAL_WIDTH / 2, panelY + 193);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.fillText('Press SPACE or Tap to Restart', LOGICAL_WIDTH / 2, panelY + 193);
    }

    // --- Game Loop ---
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - game.lastTime) / 16.667, 3); // cap at 3 frames
      game.lastTime = timestamp;

      update(dt);
      draw();

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
